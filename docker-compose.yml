services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-starhub}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - starhub_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-starhub}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-long-random-string}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-10080}
      WECHAT_MP_APPID: ${WECHAT_MP_APPID:-}
      WECHAT_MP_SECRET: ${WECHAT_MP_SECRET:-}
      QQ_MP_APPID: ${QQ_MP_APPID:-}
      QQ_MP_SECRET: ${QQ_MP_SECRET:-}
    depends_on:
      - db
    ports:
      - "${API_PORT:-8000}:8000"
    command: >
      sh -c "alembic upgrade head
      && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  starhub_pgdata:

